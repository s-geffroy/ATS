name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Lint with ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check code tests
      - name: Install project with [bridges,tests] extras
        # bridges: convertdate + lunardate so the 5 calendar bridge test
        # classes actually run instead of skipping silently.
        # tests:   hypothesis for property-based round-trip on 1000+ random
        # instants (test_property.py). Without this extra those tests skip
        # and Hypothesis-caught regressions slip through.
        run: pip install ".[bridges,tests]"
      - name: Run module demo
        run: python code/ats.py
      - name: Conformance tests (all suites)
        run: python -m unittest discover tests -v

  javascript:
    name: JavaScript (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package.json
      - name: Syntax check JS modules
        run: |
          node --check docs/assets/js/ats.js
          for f in docs/assets/js/*.js; do node --check "$f"; done
      - name: Conformance tests (all suites)
        run: |
          node tests/test_vectors.mjs
          node tests/test_arithmetic.mjs

  rust:
    name: Rust (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: code/rust
      - name: Conformance tests (12 core + 12 arithmetic vectors, bit-identical)
        working-directory: code/rust
        run: cargo test --release
      - name: Lint (clippy --all-targets -D warnings)
        working-directory: code/rust
        run: cargo clippy --all-targets --release -- -D warnings

  rust-nightly:
    name: Rust (nightly, advisory)
    runs-on: ubuntu-latest
    # Forward-compatibility canary: failures here are diagnostic, not gating.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: code/rust
      - name: Conformance tests
        working-directory: code/rust
        run: cargo test --release

  pages-preview:
    name: Pages structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required files exist
        run: |
          test -f docs/index.html
          test -f docs/fr/index.html
          test -f docs/en/index.html
          test -f docs/spec/manifesto.en.md
          test -f docs/spec/manifesto.fr.md
          test -f docs/spec/test-vectors.json
          test -f docs/spec/test-vectors-arithmetic.json
          test -f docs/assets/css/style.css
          test -f docs/assets/js/ats.js
          test -f docs/spec/rfcs/README.md
          test -f docs/spec/rfcs/0001-multi-planetary-normative.md
          test -f code/rust/Cargo.toml
          test -f code/rust/ats/src/lib.rs
          echo "Pages tree looks healthy."
